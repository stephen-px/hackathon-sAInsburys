services:

  # ── One-shot demo seeder ────────────────────────────────────────────────────
  # Wipes and recreates the DB with a realistic demo week of data.
  # Use `init` for a clean schema-only init; use `demo` to get real dashboard data.
  init:
    build: .
    command: python sainsburys/data/init_db.py
    volumes:
      - .:/app
    env_file:
      - sainsburys/.env

  # ── Demo data seeder (run once to populate real data for the dashboard) ──────
  # Opt-in (like bot): a plain `docker compose up` must NEVER wipe live state.
  # Run explicitly with: docker compose --profile demo up demo
  demo:
    profiles: ["demo"]
    build: .
    command: python sainsburys/data/demo_reset.py
    volumes:
      - .:/app
    env_file:
      - sainsburys/.env

  # ── Slack bot ───────────────────────────────────────────────────────────────
  # Opt-in only: the bot must run in EXACTLY ONE place or Slack round-robins
  # events across instances (orders land in different databases at random).
  # Start it explicitly with: docker compose --profile bot up bot
  bot:
    profiles: ["bot"]
    build: .
    command: python sainsburys/app.py
    volumes:
      - .:/app
      # Anonymous volume: keep the image's Linux-native npm install (with a
      # Linux Chromium binary) instead of letting the bind mount above shadow
      # it with the host's own (macOS) vendor/uk-grocery-cli/node_modules.
      - /app/vendor/uk-grocery-cli/node_modules
      # Sainsbury's session (from vendor/uk-grocery-cli login, or /authenticate
      # in Slack). Read-write: /authenticate needs to write a fresh session.
      - ${HOME}/.sainsburys:/root/.sainsburys
    env_file:
      - sainsburys/.env
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Live dashboard ──────────────────────────────────────────────────────────
  dashboard:
    build: .
    command: python sainsburys/dashboard/api.py
    ports:
      - "8888:3000"
    volumes:
      - .:/app
    env_file:
      - sainsburys/.env
    environment:
      # Mock is OFF by default → the dashboard shows real DB data (or empty).
      # Set DASHBOARD_MOCK=1 in your shell/.env for the wifi-down demo safety net.
      DASHBOARD_MOCK: "${DASHBOARD_MOCK:-0}"
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
