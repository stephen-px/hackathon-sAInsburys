<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sAInsburys — Waste the Difference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    @import url('https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css');
    @import url('https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.css');

    /* ── PX Kinetic — semantic tokens (dark default) ── */
    :root {
      --color-key-default:              #ffffff;
      --color-key-primary:              #578cff;
      --color-key-error:                #ff5359;
      --color-key-success:              #05a831;
      --color-key-warning:              #e96d00;
      --color-border:                   #aaabb1;
      --color-border-subtle:            #2e3035;
      --color-surface-0:                #111318;
      --color-surface-1:                #191c20;
      --color-surface-2:                #37393e;
      --color-surface-canvas:           #111318;
      --color-on-surface:               #ffffff;
      --color-on-surface-subtle:        #aaabb1;
      --color-on-primary-container:     #ffffff;
      --color-container-surface:        #1d2024;
      --color-container-surface-high:   #32353a;
      --color-container-surface-low:    #0c0e13;
      --color-container-primary:        #006efe;
      --color-container-error:          #ee0033;
      --color-state-hover:              rgba(255,255,255,0.08);
      --color-state-selected:           rgba(255,255,255,0.16);
      --color-elevation-inset:          rgba(255,255,255,0.16);
      --color-elevation-2-shadow:       rgba(0,0,0,0.16);
    }

    html.light {
      --color-key-primary:              #006efe;
      --color-key-error:                #ee0033;
      --color-key-warning:              #e96d00;
      --color-border:                   #45474c;
      --color-border-subtle:            #d6d7dd;
      --color-surface-0:                #ffffff;
      --color-surface-1:                #f3f3fa;
      --color-surface-canvas:           #f9f9ff;
      --color-on-surface:               #111318;
      --color-on-surface-subtle:        #5c5e64;
      --color-on-primary-container:     #f3f3fa;
      --color-container-surface:        #ffffff;
      --color-container-surface-high:   #e1e2e9;
      --color-container-surface-low:    #ededf4;
      --color-state-hover:              rgba(46,54,70,0.04);
      --color-state-selected:           rgba(46,54,70,0.12);
      --color-elevation-inset:          rgba(0,0,0,0.16);
      --color-elevation-2-shadow:       rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Geist', sans-serif;
      background: var(--color-surface-canvas);
      color: var(--color-on-surface);
      font-size: 13px;
      line-height: 16px;
    }

    * { scrollbar-width: thin; scrollbar-color: #525252 transparent; }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #525252; border-radius: 9999px; }

    .mi { font-family: 'Material Icons Outlined'; font-size: 16px; font-style: normal;
          line-height: 1; display: inline-block; vertical-align: middle; user-select: none; }

    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) translateX(-50%); }
      80%  { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-72px) translateX(-50%); }
    }

    @keyframes count-tick {
      0%   { transform: scale(1); }
      15%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes pulse-danger {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,83,89,0.25), inset 0 0 0 1px rgba(255,255,255,0.05); }
      50%       { box-shadow: 0 0 0 1px rgba(255,83,89,0.7),  inset 0 0 0 1px rgba(255,255,255,0.05); }
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Design helpers ────────────────────────────────────────────────────────

    const card = (extra = {}) => ({
      background: 'var(--color-container-surface)',
      borderRadius: 8,
      boxShadow: '0 2px 4px var(--color-elevation-2-shadow), inset 0 0 0 1px var(--color-elevation-inset)',
      ...extra,
    });

    const fmt = (n) => '£' + Number(n).toFixed(2);

    function Icon({ name, size = 16, color }) {
      return <span className="mi" style={{ fontSize: size, color }}>{name}</span>;
    }

    // ── Mock data ─────────────────────────────────────────────────────────────

    const MOCK = {
      stats: { saved_week: 47.30, items_rescued: 12, pending_orders: 1, active_claimers: 7 },
      leaderboard: [
        { slack_id: 'U001', name: 'Alice Chen',   saved: 18.50 },
        { slack_id: 'U002', name: 'Bob Smith',    saved: 12.30 },
        { slack_id: 'U003', name: 'Carol Jones',  saved:  9.80 },
        { slack_id: 'U004', name: 'Dave Kumar',   saved:  4.20 },
        { slack_id: 'U005', name: 'Eve Williams', saved:  2.50 },
      ],
      rescue: [
        { id: 1, name: 'Hummus & Flatbreads',   days_left: 0, qty_remaining: 2, price: 2.50, risk_score: 6.2 },
        { id: 2, name: 'Mixed Leaf Salad',      days_left: 1, qty_remaining: 3, price: 1.80, risk_score: 4.1 },
        { id: 3, name: 'Chicken Caesar Wrap',   days_left: 2, qty_remaining: 1, price: 3.50, risk_score: 2.5 },
        { id: 4, name: 'Fruit Pot',             days_left: 2, qty_remaining: 4, price: 2.00, risk_score: 2.3 },
        { id: 5, name: 'Falafel Bowl',          days_left: 3, qty_remaining: 2, price: 4.50, risk_score: 1.8 },
        { id: 6, name: 'Spiced Chickpea Wrap',  days_left: 4, qty_remaining: 5, price: 3.50, risk_score: 1.2 },
      ],
      basket: {
        week: '2026-07-20',
        orders: [
          {
            id: 1, delivery_date: '2026-07-21', status: 'approved', total: 87.40,
            lines: [
              { name: 'Chicken Caesar Wrap', qty: 8, unit_price: 3.50 },
              { name: 'Hummus & Flatbreads', qty: 6, unit_price: 2.50 },
              { name: 'Mixed Leaf Salad',    qty: 5, unit_price: 1.80 },
            ],
          },
          {
            id: 2, delivery_date: '2026-07-23', status: 'draft', total: 62.20,
            lines: [
              { name: 'Falafel Bowl',               qty: 6, unit_price: 4.50 },
              { name: 'Fruit Pot',                  qty: 8, unit_price: 2.00 },
              { name: 'Cheese & Chutney Baguette',  qty: 5, unit_price: 3.20 },
            ],
          },
        ],
      },
      totals: [
        { week: '06-29', claimed: 32.10, wasted: 18.50 },
        { week: '07-06', claimed: 41.20, wasted: 12.30 },
        { week: '07-13', claimed: 38.80, wasted:  9.50 },
        { week: '07-20', claimed: 47.30, wasted:  5.20 },
      ],
    };

    // ── Header ────────────────────────────────────────────────────────────────

    function Header({ theme, onToggle, live }) {
      return (
        <header style={{
          height: 48,
          background: 'var(--color-surface-1)',
          borderBottom: '1px solid var(--color-border-subtle)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '0 24px',
          position: 'sticky',
          top: 0,
          zIndex: 100,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{
              fontWeight: 700,
              fontSize: 12,
              background: 'var(--color-key-primary)',
              color: '#111318',
              padding: '2px 6px',
              borderRadius: 4,
              letterSpacing: '0.02em',
            }}>PX</span>
            <span style={{ fontWeight: 500, fontSize: 14 }}>sAInsburys</span>
            <span style={{ color: 'var(--color-border-subtle)', fontSize: 18, lineHeight: 1 }}>·</span>
            <span style={{ color: 'var(--color-on-surface-subtle)', fontSize: 13 }}>Waste the Difference</span>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            {live && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{
                  width: 6, height: 6, borderRadius: '50%',
                  background: 'var(--color-key-success)',
                  boxShadow: '0 0 0 2px rgba(5,168,49,0.3)',
                }} />
                <span style={{ fontSize: 11, color: 'var(--color-key-success)' }}>Live</span>
              </div>
            )}
            <button
              onClick={onToggle}
              style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: 32, height: 32,
                background: 'transparent', border: 'none',
                borderRadius: 4, color: 'var(--color-on-surface-subtle)',
                cursor: 'pointer',
              }}
              title="Toggle theme"
            >
              <Icon name={theme === 'dark' ? 'light_mode' : 'dark_mode'} size={18} />
            </button>
          </div>
        </header>
      );
    }

    // ── Hero counter ──────────────────────────────────────────────────────────

    function FloatUp({ value, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 2200);
        return () => clearTimeout(t);
      }, []);
      return (
        <span style={{
          position: 'absolute', left: '50%', bottom: 48,
          pointerEvents: 'none',
          color: 'var(--color-key-success)',
          fontSize: 22, fontWeight: 600,
          animation: 'float-up 2.2s ease-out forwards',
          whiteSpace: 'nowrap',
          textShadow: '0 0 20px rgba(5,168,49,0.5)',
        }}>
          +{fmt(value)}
        </span>
      );
    }

    function HeroCounter({ total, floats, onExpireFloat }) {
      const numRef = useRef(null);
      const prevTotal = useRef(total);

      useEffect(() => {
        try {
          if (numRef.current && total !== prevTotal.current) {
            numRef.current.style.animation = 'none';
            void numRef.current.offsetHeight;
            numRef.current.style.animation = 'count-tick 0.5s ease';
            prevTotal.current = total;
          }
        } catch (e) {
          console.error('[HeroCounter] anim error:', e.message);
        }
      }, [total]);

      return (
        <div style={{
          textAlign: 'center',
          padding: '44px 24px 36px',
          borderRadius: 8,
          position: 'relative',
          overflow: 'hidden',
          background: 'var(--color-container-surface)',
          boxShadow: '0 2px 4px var(--color-elevation-2-shadow), inset 0 0 0 1px var(--color-elevation-inset)',
        }}>
          {/* Radial glow */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            background: 'radial-gradient(ellipse 55% 100% at 50% 100%, rgba(87,140,255,0.1) 0%, transparent 70%)',
          }} />

          <div style={{ fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--color-on-surface-subtle)', marginBottom: 16, position: 'relative' }}>
            Rescued this week
          </div>

          <div
            ref={numRef}
            style={{
              fontSize: 80,
              fontWeight: 300,
              letterSpacing: '-0.025em',
              lineHeight: 1,
              color: 'var(--color-key-primary)',
              fontFamily: "'Geist', sans-serif",
              position: 'relative',
            }}
          >
            {fmt(total)}
          </div>

          <div style={{ fontSize: 13, color: 'var(--color-on-surface-subtle)', marginTop: 14, position: 'relative' }}>
            in food saved from the bin
          </div>

          {floats.map(f => (
            <FloatUp key={f.id} value={f.value} onDone={() => onExpireFloat(f.id)} />
          ))}
        </div>
      );
    }

    // ── Stat tiles ────────────────────────────────────────────────────────────

    function StatTile({ icon, value, label, accent }) {
      return (
        <div style={{
          ...card({ padding: '14px 16px' }),
          display: 'flex', flexDirection: 'column', gap: 10,
          borderTop: `2px solid ${accent}`,
          animation: 'slide-in 0.4s ease both',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 11, color: 'var(--color-on-surface-subtle)', fontWeight: 500, letterSpacing: '0.02em' }}>
              {label}
            </span>
            <Icon name={icon} size={16} color={accent} />
          </div>
          <div style={{ fontSize: 26, fontWeight: 300, letterSpacing: '-0.01em', lineHeight: 1 }}>
            {value}
          </div>
        </div>
      );
    }

    function StatTiles({ stats }) {
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
          <StatTile icon="savings"       value={fmt(stats.saved_week)}    label="Saved this week"   accent="var(--color-key-success)" />
          <StatTile icon="recycling"     value={stats.items_rescued}      label="Items rescued"     accent="#70D913" />
          <StatTile icon="shopping_cart" value={stats.pending_orders}     label="Pending approval"  accent="var(--color-key-warning)" />
          <StatTile icon="group"         value={stats.active_claimers}    label="Active claimers"   accent="var(--color-key-primary)" />
        </div>
      );
    }

    // ── Fridge health bar ─────────────────────────────────────────────────────

    function FridgeHealthBar({ rescue }) {
      const expiring = rescue.filter(r => r.days_left <= 1).length;
      const safe     = rescue.filter(r => r.days_left >= 3).length;
      const total    = rescue.length || 1;
      const pct      = Math.round(((total - expiring) / total) * 100);
      const barColor = pct > 65 ? 'var(--color-key-success)' : pct > 35 ? 'var(--color-key-warning)' : 'var(--color-key-error)';
      const status   = pct > 65 ? 'Good' : pct > 35 ? 'At risk' : 'Critical';

      return (
        <div style={{ ...card({ padding: '14px 16px' }) }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Icon name="kitchen" size={16} color={barColor} />
              <span style={{ fontSize: 13, fontWeight: 500 }}>Fridge Health</span>
              <span style={{
                fontSize: 11, fontWeight: 600, padding: '1px 8px',
                borderRadius: 9999,
                background: barColor, color: '#111318',
              }}>{status}</span>
            </div>
            <div style={{ display: 'flex', gap: 16, fontSize: 11, color: 'var(--color-on-surface-subtle)' }}>
              <span style={{ color: 'var(--color-key-error)' }}>{expiring} expiring soon</span>
              <span>{safe} safe 3+ days</span>
            </div>
          </div>
          <div style={{ height: 5, background: 'var(--color-border-subtle)', borderRadius: 9999, overflow: 'hidden' }}>
            <div style={{
              height: '100%',
              width: `${pct}%`,
              background: barColor,
              borderRadius: 9999,
              transition: 'width 800ms cubic-bezier(0.4,0,0.2,1)',
            }} />
          </div>
        </div>
      );
    }

    // ── Rescue board ──────────────────────────────────────────────────────────

    function ExpiryBadge({ days }) {
      const pill = (bg, fg, label) => (
        <span style={{
          display: 'inline-flex', alignItems: 'center',
          padding: '0 8px', height: 20, borderRadius: 9999,
          background: bg, color: fg,
          fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
        }}>{label}</span>
      );
      if (days <= 0) return pill('var(--color-key-error)',   '#fff',                        'TODAY');
      if (days === 1) return pill('var(--color-key-warning)', '#111318',                    '1 day');
      if (days === 2) return pill('rgba(87,140,255,0.2)',    'var(--color-key-primary)',    '2 days');
      return pill('var(--color-border-subtle)', 'var(--color-on-surface-subtle)', `${days}d`);
    }

    function RescueBoard({ items }) {
      return (
        <div style={{ ...card({ padding: 0, overflow: 'hidden', flex: 1, minWidth: 0 }) }}>
          <div style={{
            padding: '13px 16px', display: 'flex', alignItems: 'center', gap: 8,
            borderBottom: '1px solid var(--color-border-subtle)',
          }}>
            <Icon name="warning" size={16} color="var(--color-key-warning)" />
            <span style={{ fontWeight: 500, fontSize: 13 }}>Rescue Board</span>
            <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--color-on-surface-subtle)' }}>
              {items.length} items in fridge
            </span>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ borderBottom: '1px solid var(--color-border-subtle)' }}>
                  {['Item', 'Expires', 'Qty', 'At risk'].map((h, i) => (
                    <th key={h} style={{
                      padding: '7px 16px', textAlign: i >= 2 ? 'right' : 'left',
                      fontSize: 11, fontWeight: 500, color: 'var(--color-on-surface-subtle)',
                      whiteSpace: 'nowrap',
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {items.map((item, i) => {
                  const critical = item.days_left <= 0;
                  const rowBg = critical ? 'rgba(255,83,89,0.04)' : 'transparent';
                  return (
                    <tr key={item.id} style={{
                      borderBottom: i < items.length - 1 ? '1px solid var(--color-border-subtle)' : 'none',
                      background: rowBg,
                      animation: critical ? 'pulse-danger 2.5s ease infinite' : 'none',
                    }}>
                      <td style={{ padding: '10px 16px', fontSize: 13 }}>{item.name}</td>
                      <td style={{ padding: '10px 16px' }}><ExpiryBadge days={item.days_left} /></td>
                      <td style={{ padding: '10px 16px', textAlign: 'right', fontFamily: "'Geist Mono', monospace", fontSize: 12, color: 'var(--color-on-surface-subtle)' }}>
                        {item.qty_remaining}
                      </td>
                      <td style={{ padding: '10px 16px', textAlign: 'right', fontFamily: "'Geist Mono', monospace", fontSize: 13, color: item.days_left <= 1 ? 'var(--color-key-error)' : 'var(--color-on-surface)' }}>
                        {fmt(item.qty_remaining * item.price)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Leaderboard ───────────────────────────────────────────────────────────

    function Leaderboard({ entries }) {
      const MEDAL_ICONS  = ['emoji_events', 'military_tech', 'workspace_premium'];
      const MEDAL_COLORS = ['#DC9E17', '#AAABB1', '#AD5D08'];

      return (
        <div style={{ ...card({ padding: 0, width: 280, flexShrink: 0, overflow: 'hidden' }) }}>
          <div style={{
            padding: '13px 16px', display: 'flex', alignItems: 'center', gap: 8,
            borderBottom: '1px solid var(--color-border-subtle)',
          }}>
            <Icon name="emoji_events" size={16} color="#DC9E17" />
            <span style={{ fontWeight: 500, fontSize: 13 }}>Leaderboard</span>
          </div>
          <div style={{ padding: '6px 0' }}>
            {entries.map((e, i) => (
              <div key={e.slack_id} style={{
                display: 'flex', alignItems: 'center',
                padding: '9px 16px', gap: 10,
                background: i === 0 ? 'rgba(87,140,255,0.06)' : 'transparent',
                borderLeft: i === 0 ? '2px solid var(--color-key-primary)' : '2px solid transparent',
              }}>
                <span style={{ width: 18, display: 'flex', justifyContent: 'center', flexShrink: 0 }}>
                  {i < 3
                    ? <Icon name={MEDAL_ICONS[i]} size={16} color={MEDAL_COLORS[i]} />
                    : <span style={{ fontSize: 11, color: 'var(--color-on-surface-subtle)', fontFamily: "'Geist Mono', monospace" }}>{i + 1}</span>
                  }
                </span>
                <span style={{
                  flex: 1, fontSize: 13, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  color: i === 0 ? 'var(--color-key-primary)' : 'var(--color-on-surface)',
                  fontWeight: i === 0 ? 500 : 400,
                }}>
                  {e.name}
                </span>
                <span style={{
                  fontFamily: "'Geist Mono', monospace", fontSize: 13, flexShrink: 0,
                  color: i === 0 ? 'var(--color-key-primary)' : 'var(--color-on-surface-subtle)',
                }}>
                  {fmt(e.saved)}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Basket status ─────────────────────────────────────────────────────────

    const STATUS_CONFIGS = {
      draft:     { bg: 'var(--color-border-subtle)',    fg: 'var(--color-on-surface-subtle)', label: 'Draft',     icon: 'edit' },
      approved:  { bg: 'rgba(5,168,49,0.18)',           fg: 'var(--color-key-success)',       label: 'Approved',  icon: 'check_circle' },
      delivered: { bg: 'rgba(87,140,255,0.18)',         fg: 'var(--color-key-primary)',       label: 'Delivered', icon: 'local_shipping' },
    };

    function StatusBadge({ status }) {
      const cfg = STATUS_CONFIGS[status] || STATUS_CONFIGS.draft;
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          padding: '0 8px', height: 22, borderRadius: 9999,
          background: cfg.bg, color: cfg.fg,
          fontSize: 11, fontWeight: 600,
        }}>
          <Icon name={cfg.icon} size={12} color={cfg.fg} />
          {cfg.label}
        </span>
      );
    }

    function BasketOrder({ order }) {
      const date = (() => {
        try {
          return new Date(order.delivery_date).toLocaleDateString('en-GB', { weekday: 'short', month: 'short', day: 'numeric' });
        } catch (e) { return order.delivery_date; }
      })();
      const accentColor = order.status === 'approved' ? 'var(--color-key-success)'
                        : order.status === 'delivered' ? 'var(--color-key-primary)'
                        : 'var(--color-border-subtle)';

      return (
        <div style={{
          flex: 1,
          background: 'var(--color-container-surface-low)',
          borderRadius: 6,
          padding: 14,
          border: '1px solid var(--color-border-subtle)',
          borderTop: `2px solid ${accentColor}`,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <Icon name="local_shipping" size={14} color="var(--color-on-surface-subtle)" />
              <span style={{ fontSize: 13, fontWeight: 500 }}>{date}</span>
            </div>
            <StatusBadge status={order.status} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            {order.lines.map((l, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 12, color: 'var(--color-on-surface-subtle)' }}>
                  <span style={{ fontFamily: "'Geist Mono', monospace", color: 'var(--color-on-surface)', fontSize: 12 }}>{l.qty}×</span>{' '}{l.name}
                </span>
                <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 12, color: 'var(--color-on-surface-subtle)', flexShrink: 0, marginLeft: 8 }}>
                  {fmt(l.qty * l.unit_price)}
                </span>
              </div>
            ))}
          </div>
          <div style={{
            borderTop: '1px solid var(--color-border-subtle)',
            marginTop: 12, paddingTop: 10,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <span style={{ fontSize: 11, color: 'var(--color-on-surface-subtle)' }}>Total</span>
            <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 14, fontWeight: 500 }}>{fmt(order.total)}</span>
          </div>
        </div>
      );
    }

    function BasketStatus({ basket }) {
      return (
        <div style={{ ...card({ padding: 0, overflow: 'hidden' }) }}>
          <div style={{ padding: '13px 16px', display: 'flex', alignItems: 'center', gap: 8, borderBottom: '1px solid var(--color-border-subtle)' }}>
            <Icon name="shopping_basket" size={16} color="var(--color-key-primary)" />
            <span style={{ fontWeight: 500, fontSize: 13 }}>This Week's Baskets</span>
            <span style={{ fontSize: 11, color: 'var(--color-on-surface-subtle)', marginLeft: 4 }}>w/c {basket.week}</span>
          </div>
          <div style={{ display: 'flex', gap: 12, padding: 16 }}>
            {basket.orders.map(o => <BasketOrder key={o.id} order={o} />)}
          </div>
        </div>
      );
    }

    // ── Weekly chart (inline SVG) ─────────────────────────────────────────────

    function WeeklyChart({ totals }) {
      try {
        const W = 560, H = 96, PAD_L = 48, PAD_R = 12, PAD_B = 22;
        const chartW = W - PAD_L - PAD_R;
        const maxVal = Math.max(...totals.flatMap(t => [t.claimed + t.wasted])) * 1.15 || 60;
        const n      = totals.length;
        const colW   = chartW / n;
        const barW   = colW * 0.28;

        const yTicks = [0, maxVal / 2, maxVal].map(v => ({
          v, y: H - (v / maxVal) * H,
        }));

        return (
          <div style={{ ...card() }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <Icon name="bar_chart" size={16} color="var(--color-on-surface-subtle)" />
                <span style={{ fontWeight: 500, fontSize: 13 }}>Weekly Impact</span>
              </div>
              <div style={{ display: 'flex', gap: 16 }}>
                {[['Rescued', '#70D913'], ['Wasted', '#FF5359']].map(([label, color]) => (
                  <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: color }} />
                    <span style={{ fontSize: 11, color: 'var(--color-on-surface-subtle)' }}>{label}</span>
                  </div>
                ))}
              </div>
            </div>

            <svg viewBox={`0 0 ${W} ${H + PAD_B}`} style={{ width: '100%', display: 'block', overflow: 'visible' }}>
              {/* Grid lines */}
              {yTicks.map(t => (
                <g key={t.y}>
                  <line x1={PAD_L} y1={t.y} x2={W - PAD_R} y2={t.y}
                    stroke="var(--color-border-subtle)" strokeWidth={1} />
                  <text x={PAD_L - 6} y={t.y + 4} textAnchor="end" fontSize={9}
                    fill="var(--color-on-surface-subtle)" fontFamily="Geist Mono, monospace">
                    {fmt(t.v)}
                  </text>
                </g>
              ))}

              {/* Bars */}
              {totals.map((t, i) => {
                const cx       = PAD_L + i * colW + colW / 2;
                const claimedH = (t.claimed / maxVal) * H;
                const wastedH  = (t.wasted  / maxVal) * H;
                return (
                  <g key={i}>
                    <rect x={cx - barW - 2} y={H - claimedH} width={barW} height={claimedH}
                      fill="#70D913" rx={2} opacity={0.85} />
                    <rect x={cx + 2}        y={H - wastedH}  width={barW} height={wastedH}
                      fill="#FF5359" rx={2} opacity={0.85} />
                    <text x={cx} y={H + PAD_B - 2} textAnchor="middle" fontSize={10}
                      fill="var(--color-on-surface-subtle)" fontFamily="Geist, sans-serif">
                      {t.week}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>
        );
      } catch (e) {
        console.error('[WeeklyChart] render error:', e.message, e.stack);
        return null;
      }
    }

    // ── App root ──────────────────────────────────────────────────────────────

    function App() {
      const [theme, setTheme] = useState('dark');
      const [data,  setData]  = useState(MOCK);
      const [floats, setFloats] = useState([]);
      const [live,  setLive]  = useState(false);

      useEffect(() => {
        document.documentElement.classList.toggle('light', theme === 'light');
      }, [theme]);

      // 5-second data poll
      useEffect(() => {
        const fetchAll = async () => {
          try {
            const [s, lb, r, b, t] = await Promise.all([
              fetch('/api/stats'),
              fetch('/api/leaderboard'),
              fetch('/api/rescue'),
              fetch('/api/basket'),
              fetch('/api/totals'),
            ]);
            if (!s.ok) return;
            const [stats, leaderboard, rescue, basket, totals] = await Promise.all([
              s.json(), lb.json(), r.json(), b.json(), t.json(),
            ]);
            setData({ stats, leaderboard, rescue, basket, totals });
          } catch (_) {
            // No API server — stay on mock data
          }
        };
        fetchAll();
        const id = setInterval(fetchAll, 5000);
        return () => clearInterval(id);
      }, []);

      // SSE live counter
      useEffect(() => {
        let es;
        try {
          es = new EventSource('/api/events/stream');
          es.onopen  = () => setLive(true);
          es.onerror = () => setLive(false);
          es.onmessage = (e) => {
            try {
              const ev = JSON.parse(e.data);
              if (ev.kind === 'claimed' && ev.value > 0) {
                setData(d => ({
                  ...d,
                  stats: {
                    ...d.stats,
                    saved_week:    d.stats.saved_week    + ev.value,
                    items_rescued: d.stats.items_rescued + 1,
                    active_claimers: d.stats.active_claimers,
                  },
                }));
                setFloats(f => [...f, { id: Date.now() + Math.random(), value: ev.value }]);
              }
            } catch (err) {
              console.error('[SSE onmessage]', err.message);
            }
          };
        } catch (_) {}
        return () => { try { es && es.close(); } catch (_) {} };
      }, []);

      const expireFloat = useCallback((id) => setFloats(f => f.filter(x => x.id !== id)), []);

      return (
        <div>
          <Header theme={theme} onToggle={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} live={live} />
          <main style={{ maxWidth: 1200, margin: '0 auto', padding: '20px 24px 40px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            <HeroCounter total={data.stats.saved_week} floats={floats} onExpireFloat={expireFloat} />
            <StatTiles stats={data.stats} />
            <FridgeHealthBar rescue={data.rescue} />
            <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
              <RescueBoard items={data.rescue} />
              <Leaderboard entries={data.leaderboard} />
            </div>
            <BasketStatus basket={data.basket} />
            <WeeklyChart totals={data.totals} />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
