display_information:
  name: sAInsburys
features:
  bot_user:
    display_name: sAInsburys
  slash_commands:
    - command: /order
      description: Order your lunch for the week
    - command: /demo-checkin
      description: Send Friday what-did-you-eat DMs
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - commands
      - im:write
      - users:read
      - channels:read
settings:
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
